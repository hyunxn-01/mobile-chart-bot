name: Daily Mobile Chart Report
on:
  workflow_dispatch:  # cron-job.org 자동 트리거 + 수동 실행 버튼
jobs:
  collect-and-send:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Seoul  # GitHub 러너는 UTC → datetime.now()가 KST보다 9h 느려 오전 메일 날짜가 전날로 찍힘. KST 고정으로 정정.

    permissions:
      contents: write  # data/history 커밋 위해 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run chart collector
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python chart_collector.py

      - name: Build dashboard data
        run: python build_dashboard.py

      - name: Check design invariants (gate)
        run: |
          python check_invariants.py --selftest
          python check_invariants.py docs/markets

      - name: Commit data for future comparison
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Daily chart data $(date +'%Y-%m-%d')"
          git push
