<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>모바일 게임 차트 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{
    --bg:#ffffff; --panel:#f7f7f5; --line:#e5e4df; --text:#1d1d1b; --muted:#6b6a64;
    --accent:#2563eb; --chip:#eef1f6;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1a1a18; --panel:#242421; --line:#37362f; --text:#ececea; --muted:#a3a29a; --chip:#2c2f36; }
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    line-height:1.5; }
  .wrap{ max-width:1560px; margin:0 auto; padding:20px 22px 48px; }
  header h1{ font-size:20px; font-weight:600; margin:0 0 4px; }
  .meta{ font-size:13px; color:var(--muted); margin:0 0 16px; }
  .meta b{ color:var(--text); font-weight:600; }
  .tabs{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
  .tab{ font:inherit; font-size:14px; padding:7px 14px; border:1px solid var(--line);
    background:var(--bg); color:var(--text); border-radius:8px; cursor:pointer; }
  .tab[aria-selected="true"]{ background:var(--text); color:var(--bg); border-color:var(--text); }
  .tab:disabled{ opacity:.4; cursor:not-allowed; }
  .hint{ font-size:12.5px; color:var(--muted); margin:10px 0 12px; }
  .banner{ font-size:13px; color:#9a5b00; background:#fff5e6; border:1px solid #f3d9a6;
    padding:8px 12px; border-radius:8px; margin:0 0 12px; }
  @media (prefers-color-scheme: dark){ .banner{ color:#f0c074; background:#2e2616; border-color:#4a3c1d; } }
  .layout{ display:flex; gap:18px; align-items:flex-start; }
  .chartbox{ flex:1 1 auto; min-width:0; }
  .canvas-wrap{ position:relative; width:100%; height:480px; }
  .panel{ flex:0 0 248px; border:1px solid var(--line); border-radius:12px;
    background:var(--panel); padding:11px; }
  .panel .row{ display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  .search{ font:inherit; font-size:14px; flex:1; padding:8px 10px; border:1px solid var(--line);
    border-radius:8px; background:var(--bg); color:var(--text); }
  .clearbtn{ font:inherit; font-size:12.5px; padding:8px 10px; border:1px solid var(--line);
    background:var(--bg); color:var(--text); border-radius:8px; cursor:pointer; white-space:nowrap; }
  .selcount{ font-size:12px; color:var(--muted); margin:0 2px 8px; }
  .list{ max-height:380px; overflow-y:auto; display:flex; flex-direction:column; gap:3px; }
  .gitem{ display:flex; align-items:center; gap:8px; width:100%; text-align:left; font:inherit;
    font-size:13px; padding:6px 8px; border:1px solid transparent; background:transparent;
    color:var(--text); border-radius:7px; cursor:pointer; }
  .gitem:hover{ background:var(--chip); }
  .gitem[aria-pressed="true"]{ background:var(--chip); border-color:var(--line); }
  .sw{ width:10px; height:10px; border-radius:3px; flex:0 0 auto; background:#c9c8c2; }
  .gname{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .gdev{ color:var(--muted); font-size:11.5px; }
  .grank{ flex:0 0 auto; font-size:11.5px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .empty{ font-size:13px; color:var(--muted); padding:10px 4px; }
  .histsec{ margin-top:28px; }
  .histsec h2{ font-size:16px; font-weight:600; margin:0 0 4px; }
  .histsec .sub{ font-size:12.5px; color:var(--muted); margin:0 0 10px; }
  .histscroll{ overflow:auto; max-height:640px; border:1px solid var(--line); border-radius:10px; }
  .histtable{ border-collapse:separate; border-spacing:0; font-size:12.5px; width:max-content; min-width:100%; }
  .histtable th, .histtable td{ padding:8px 16px; text-align:center; white-space:nowrap;
    border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums; }
  .histtable thead th{ position:sticky; top:0; z-index:1; background:var(--panel); color:var(--muted); font-weight:500; }
  .histtable .gcol{ text-align:left; position:sticky; left:0; z-index:1; background:var(--bg); font-weight:500;
    box-sizing:border-box; width:180px; min-width:180px; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .histtable thead .gcol{ z-index:3; background:var(--panel); }
  .histtable .colorcol{ position:sticky; left:180px; z-index:1; padding:0; width:16px; min-width:16px; max-width:16px; }
  .histtable thead .colorcol{ z-index:3; background:var(--panel); }
  .histtable td.up{ color:#16a34a; font-weight:600; }
  .histtable td.down{ color:#dc2626; }
  .histtable td.na{ color:var(--muted); }
  @media (max-width:820px){
    .layout{ flex-direction:column; }
    .panel{ flex:1 1 auto; width:100%; }
    .canvas-wrap{ height:60vh; min-height:340px; }
    .list{ max-height:260px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>모바일 게임 차트 대시보드</h1>
    <p class="meta" id="meta">불러오는 중…</p>
  </header>

  <div class="tabs" id="tabs" role="tablist">
    <button class="tab" role="tab" data-tf="daily" aria-selected="true">일별</button>
    <button class="tab" role="tab" data-tf="weekly" aria-selected="false">주별</button>
    <button class="tab" role="tab" data-tf="monthly" aria-selected="false">월별</button>
    <button class="tab" role="tab" data-tf="quarterly" aria-selected="false">분기별</button>
    <button class="tab" role="tab" data-tf="yearly" aria-selected="false">년별</button>
  </div>
  <p class="hint">회색 선이 전체 게임입니다. 오른쪽에서 게임을 선택하면 그 순위선만 색으로 강조됩니다. (위로 갈수록 높은 순위)</p>
  <div class="banner" id="banner" style="display:none"></div>

  <div class="layout">
    <div class="chartbox">
      <div class="canvas-wrap">
        <canvas id="chart" role="img" aria-label="모바일 게임 순위 추이 꺾은선 그래프. 위쪽이 1위. 선택한 게임의 선이 강조됩니다."></canvas>
      </div>
    </div>
    <aside class="panel">
      <div class="row">
        <input class="search" id="search" type="search" placeholder="게임 검색 (이름·개발사)" aria-label="게임 검색">
        <button class="clearbtn" id="clear">전체 해제</button>
      </div>
      <p class="selcount" id="selcount">선택된 게임 없음</p>
      <div class="list" id="list"></div>
    </aside>
  </div>

  <div class="histsec" id="histsec">
    <h2>선택 게임 순위 이력</h2>
    <p class="sub" id="histsub">위 그래프에서 게임을 선택하면, 그 게임의 시간축별 순위가 여기에 표로 나옵니다.</p>
    <div id="history"></div>
  </div>
</div>

<script>
const PALETTE = ['#2563eb','#dc2626','#16a34a','#d97706','#7c3aed','#0891b2','#db2777','#65a30d',
  '#ea580c','#0d9488','#4f46e5','#b91c1c','#15803d','#a16207','#9333ea','#0e7490','#be185d','#c2410c'];
const TF_LABEL = {daily:'일별', weekly:'주별', monthly:'월별', quarterly:'분기별', yearly:'년별'};

let DATA=null, chart=null, activeTf='daily';
const selected=[]; // app_id, 선택 순서 유지
let order=[];       // 게임 표시 순서(최근 순위 오름차순)

function latestDaily(aid){
  const s=DATA.timeframes.daily.series[aid]||[];
  for(let i=s.length-1;i>=0;i--){ if(s[i]!=null) return s[i]; }
  return 9999;
}
function colorFor(aid){
  const i=selected.indexOf(aid);
  return i<0 ? null : PALETTE[i % PALETTE.length];
}

function buildDatasets(){
  const tf=DATA.timeframes[activeTf];
  const ids=Object.keys(DATA.games);
  return ids.map(aid=>({
    aid, label:DATA.games[aid].title,
    data:tf.series[aid],
    borderColor:'rgba(130,130,125,0.28)', backgroundColor:'transparent',
    borderWidth:1, pointRadius:0, pointHoverRadius:4, spanGaps:false, tension:0.2,
  }));
}

function restyle(){
  const any=selected.length>0;
  chart.data.datasets.forEach(ds=>{
    const c=colorFor(ds.aid);
    if(c){ ds.borderColor=c; ds.borderWidth=2.6; ds.pointRadius=(chart.data.labels.length<=2?4:0); ds.pointBackgroundColor=c; ds.order=0; }
    else if(any){ ds.borderColor='rgba(130,130,125,0.12)'; ds.borderWidth=1; ds.pointRadius=0; ds.order=2; }
    else { ds.borderColor='rgba(130,130,125,0.28)'; ds.borderWidth=1; ds.pointRadius=0; ds.order=1; }
  });
  chart.update();
  renderSelCount();
  renderList();
  renderHistory();
}

function switchTf(tf){
  activeTf=tf;
  const t=DATA.timeframes[tf];
  document.querySelectorAll('.tab').forEach(b=> b.setAttribute('aria-selected', String(b.dataset.tf===tf)));
  chart.data.labels=t.labels;
  chart.data.datasets.forEach(ds=> ds.data=t.series[ds.aid]);
  const banner=document.getElementById('banner');
  if(t.labels.length<2){
    banner.style.display=''; banner.textContent=`'${TF_LABEL[tf]}' 시간축은 아직 데이터가 부족합니다 (구간 ${t.labels.length}개). 기간이 더 쌓이면 추이선이 그려집니다.`;
  } else { banner.style.display='none'; }
  restyle();
}

function renderSelCount(){
  const el=document.getElementById('selcount');
  el.textContent = selected.length ? `선택된 게임 ${selected.length}개 — 다시 누르면 해제` : '선택된 게임 없음';
}

function renderList(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const list=document.getElementById('list');
  const rows=order.filter(aid=>{
    if(!q) return true;
    const g=DATA.games[aid];
    return (g.title||'').toLowerCase().includes(q) || (g.developer||'').toLowerCase().includes(q);
  });
  if(!rows.length){ list.innerHTML='<p class="empty">검색 결과가 없습니다.</p>'; return; }
  list.innerHTML='';
  rows.forEach(aid=>{
    const g=DATA.games[aid];
    const sel=selected.includes(aid);
    const c=colorFor(aid);
    const r=latestDaily(aid);
    const btn=document.createElement('button');
    btn.className='gitem'; btn.setAttribute('aria-pressed', String(sel));
    btn.innerHTML=`<span class="sw" style="background:${c||'#c9c8c2'}"></span>`+
      `<span class="gname">${esc(g.title)} <span class="gdev">${esc(g.developer||'')}</span></span>`+
      `<span class="grank">${r<9999?r+'위':'-'}</span>`;
    btn.addEventListener('click',()=> toggle(aid));
    list.appendChild(btn);
  });
}

function renderHistory(){
  const sub=document.getElementById('histsub');
  const wrap=document.getElementById('history');
  const tf=DATA.timeframes[activeTf];
  sub.textContent = `${TF_LABEL[activeTf]} 기준 · 위 시간축 탭을 바꾸면 같이 바뀝니다. 숫자는 순위(작을수록 상위), 초록=상승·빨강=하락.`;
  if(!selected.length){
    wrap.innerHTML='<p class="empty">위 그래프에서 게임을 선택하면, 그 게임의 '+TF_LABEL[activeTf]+' 순위 이력이 여기에 표로 표시됩니다.</p>';
    return;
  }
  const labels=tf.labels;
  let h='<div class="histscroll"><table class="histtable"><thead><tr><th class="gcol">게임</th><th class="colorcol" title="그래프 색"></th>';
  labels.forEach(l=> h+=`<th>${esc(l)}</th>`);
  h+='</tr></thead><tbody>';
  selected.forEach(aid=>{
    const c=colorFor(aid), s=tf.series[aid]||[];
    h+=`<tr><td class="gcol" title="${esc(DATA.games[aid].title)}">${esc(DATA.games[aid].title)}</td><td class="colorcol" style="background:${c}"></td>`;
    s.forEach((v,i)=>{
      let cls='na';
      if(v!=null){
        cls='';
        const prev=i>0? s[i-1] : null;
        if(prev!=null && v<prev) cls='up';
        else if(prev!=null && v>prev) cls='down';
      }
      h+=`<td class="${cls}">${v!=null? v : '–'}</td>`;
    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  wrap.innerHTML=h;
}

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function toggle(aid){
  const i=selected.indexOf(aid);
  if(i<0) selected.push(aid); else selected.splice(i,1);
  restyle();
}

function init(data){
  DATA=data;
  order=Object.keys(DATA.games).sort((a,b)=> latestDaily(a)-latestDaily(b));
  const m=document.getElementById('meta');
  const dr=DATA.date_range||[];
  m.innerHTML=`<b>${DATA.chart_used||'차트'}</b> · 수집 <b>${DATA.num_days}</b>일 (${dr[0]||''} ~ ${dr[1]||''}) · 게임 <b>${DATA.num_games}</b>개 · 갱신 ${DATA.generated_at||''}`;

  chart=new Chart(document.getElementById('chart'),{
    type:'line',
    data:{ labels:DATA.timeframes.daily.labels, datasets:buildDatasets() },
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      interaction:{ mode:'nearest', intersect:false, axis:'xy' },
      plugins:{ legend:{display:false},
        tooltip:{ filter:(it)=> it.parsed.y!=null,
          callbacks:{ label:(c)=> `${c.dataset.label} · ${c.parsed.y}위` } } },
      scales:{
        y:{ reverse:true, min:1, max:100, title:{display:true, text:'순위 (위가 1위)'},
            ticks:{ stepSize:10, color:'#8b8b85' }, grid:{ color:'rgba(130,130,125,0.14)' } },
        x:{ ticks:{ color:'#8b8b85', maxRotation:0, autoSkip:true, maxTicksLimit:14 }, grid:{ display:false } } },
    },
  });

  document.querySelectorAll('.tab').forEach(b=>{
    const tf=b.dataset.tf;
    if((DATA.timeframes[tf]?.labels||[]).length===0) b.disabled=true;
    b.addEventListener('click',()=> switchTf(tf));
  });
  document.getElementById('search').addEventListener('input', renderList);
  document.getElementById('clear').addEventListener('click',()=>{ selected.length=0; restyle(); });

  switchTf('daily');
}

fetch('./data.json').then(r=>{ if(!r.ok) throw new Error('data.json '+r.status); return r.json(); })
  .then(init)
  .catch(e=>{ document.getElementById('meta').textContent='데이터를 불러오지 못했습니다: '+e.message; });
</script>
</body>
</html>
